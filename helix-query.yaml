version: 1

indices:
  pages:
    include:
      - '/product/**'
    exclude:
      - '/product'
    target: /product-index.json
    properties:
      title:
        select: head > meta[property="og:title"]
        value: attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: attribute(el, 'content')
      image:
        select: head > meta[property="og:image"]
        value: attribute(el, 'content')
      lastModified:
        select: headers["last-modified"]
        value: date(el)